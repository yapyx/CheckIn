name: checkin_flutter
description: A Flutter mobile implementation of the CheckIn caregiving prototype.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: '>=3.0.0 <5.0.0'
  firebase_storage: '>=12.0.0 <14.0.0'
  http: ^1.2.2
  path_provider: ^2.1.5
  record: '>=5.0.0 <7.0.0'
  audioplayers: ^6.6.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/home page.png
    - assets/logo.png
    - assets/caregiver pfp.png
    - assets/senior pfp.png
